name: Sync Node.js musl binaries

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version (e.g. 22.16.0)'
        required: false
        default: ''
      keep_versions:
        description: 'Number of old versions to keep (default 3)'
        required: false
        default: '3'
  push:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine Node.js version
        id: ver
        run: |
          INPUT_VER="${{ github.event.inputs.node_version }}"
          if [ -n "$INPUT_VER" ]; then
            echo "version=${INPUT_VER}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(curl -fsSL https://nodejs.org/dist/index.json | \
              python3 -c "import sys,json; data=json.load(sys.stdin); lts=[x for x in data if x['lts']]; print(lts[0]['version'].lstrip('v'))")
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "Latest LTS: ${LATEST}"
          fi

      - name: Determine arches to download
        id: arches
        run: |
          ARCHS="linux-x64-musl"
          for ARCH in arm64-musl armv7l-musl; do
            VER="${{ steps.ver.outputs.version }}"
            URL="https://unofficial-builds.nodejs.org/download/release/v${VER}/node-v${VER}-${ARCH}.tar.gz"
            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" -L "$URL")
            if [ "$HTTP_CODE" = "200" ]; then
              ARCHS="${ARCHS} ${ARCH}"
              echo "Found: ${ARCH}"
            else
              echo "Not found: ${ARCH} (HTTP ${HTTP_CODE})"
            fi
          done
          echo "archs=${ARCHS}" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ARCHS="${{ steps.arches.outputs.archs }}"
          if gh release view node-bins --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            ALL_EXIST=true
            for ARCH in $ARCHS; do
              FILE="node-v${VER}-${ARCH}.tar.gz"
              if ! gh release view node-bins --repo "$GITHUB_REPOSITORY" - json tag --jq '.assets[] | select(.name == "'$FILE'")' | grep -q "$FILE"; then
                ALL_EXIST=false
                break
              fi
            done
            if $ALL_EXIST; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "v${VER} all binaries already in node-bins release, skipping."
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "Need to upload missing binaries for v${VER}."
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Release node-bins does not exist yet."
          fi

      - name: Download Node.js musl binaries
        if: steps.check.outputs.skip == 'false'
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ARCHS="${{ steps.arches.outputs.archs }}"

          echo "Downloading Node.js v${VER} musl builds..."
          for ARCH in $ARCHS; do
            FILE="node-v${VER}-${ARCH}.tar.gz"
            URL="https://unofficial-builds.nodejs.org/download/release/v${VER}/${FILE}"
            echo "  -> ${ARCH}"
            curl -fsSL "$URL" -o "$FILE" || { echo "ERROR: Failed to download ${FILE}"; exit 1; }
          done

          for f in node-v${VER}-linux-*.tar.gz; do
            SIZE=$(stat -c%s "$f")
            if [ "$SIZE" -lt 10000000 ]; then
              echo "ERROR: $f too small ($SIZE bytes)"
              exit 1
            fi
          done
          echo "Download OK"

      - name: Create or update node-bins release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ARCHS="${{ steps.arches.outputs.archs }}"
          REPO="$GITHUB_REPOSITORY"

          if ! gh release view node-bins --repo "$REPO" >/dev/null 2>&1; then
            gh release create node-bins \
              --repo "$REPO" \
              --title "Node.js musl binaries" \
              --notes "Precompiled Node.js musl static builds for OpenWrt (x86_64, aarch64, armv7l).

Sources: [unofficial-builds.nodejs.org](https://unofficial-builds.nodejs.org/)

These binaries are used by \`openclaw-env\` to install Node.js on OpenWrt devices." \
              --prerelease
          fi

          for ARCH in $ARCHS; do
            gh release upload node-bins "node-v${VER}-${ARCH}.tar.gz" --repo "$REPO" --clobber
          done

          echo "Uploaded node-v${VER} musl binaries to node-bins release."

      - name: Cleanup old versions
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEEP="${{ github.event.inputs.keep_versions }}"
          [ -z "$KEEP" ] && KEEP=3
          REPO="$GITHUB_REPOSITORY"

          echo "Keeping last ${KEEP} versions..."

          ASSETS=$(gh release view node-bins --repo "$REPO" - json assets --jq '.[] | "\(.id)\t\(.name)"')

          declare -A VERSIONS
          while IFS=$'\t' read -r ID NAME; do
            VER_FROM_NAME=$(echo "$NAME" | sed -E 's/node-v(.+)-linux.*/\1/')
            VERSIONS["$VER_FROM_NAME"]+="$ID "
          done <<< "$ASSETS"

          SORTED_VERSIONS=$(printf '%s\n' "${!VERSIONS[@]}" | sort -V -r)

          COUNT=0
          for VER in $SORTED_VERSIONS; do
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -gt "$KEEP" ]; then
              echo "Marking for deletion: v${VER}"
              for ASSET_ID in ${VERSIONS[$VER]}; do
                gh api "repos/$REPO/releases/assets/$(echo $ASSET_ID | tr -d ' ')" -X DELETE
              done
            fi
          done

          echo "Cleanup done."
