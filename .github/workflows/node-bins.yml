name: Sync Node.js musl binaries

on:
  workflow_dispatch:
    inputs:
      node_version:
        description: 'Node.js version (e.g. 22.16.0)'
        required: false
        default: ''
      keep_versions:
        description: 'Number of old versions to keep (default 3)'
        required: false
        default: '3'
  schedule:
    # Check for new LTS releases weekly on Monday 02:00 UTC
    - cron: '0 2 * * 1'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine Node.js version
        id: ver
        run: |
          INPUT_VER="${{ github.event.inputs.node_version }}"
          if [ -n "$INPUT_VER" ]; then
            echo "version=${INPUT_VER}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(curl -fsSL https://nodejs.org/dist/index.json | \
              python3 -c "import sys,json; data=json.load(sys.stdin); lts=[x for x in data if x['lts']]; print(lts[0]['version'].lstrip('v'))")
            echo "version=${LATEST}" >> "$GITHUB_OUTPUT"
            echo "Latest LTS: ${LATEST}"
          fi

      - name: Determine available architectures
        id: arches
        run: |
          VER="${{ steps.ver.outputs.version }}"
          # All arch names use the full "linux-<arch>-musl" format matching the upstream filename
          # x64 is always included; arm64 and armv7l are probed first
          ARCHS="linux-x64-musl"
          for ARCH in linux-arm64-musl linux-armv7l-musl; do
            URL="https://unofficial-builds.nodejs.org/download/release/v${VER}/node-v${VER}-${ARCH}.tar.gz"
            HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" -L "$URL")
            if [ "$HTTP_CODE" = "200" ]; then
              ARCHS="${ARCHS} ${ARCH}"
              echo "Found: ${ARCH}"
            else
              echo "Not found: ${ARCH} (HTTP ${HTTP_CODE})"
            fi
          done
          echo "archs=${ARCHS}" >> "$GITHUB_OUTPUT"
          echo "Will download: ${ARCHS}"

      - name: Check if already released
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ARCHS="${{ steps.arches.outputs.archs }}"

          if ! gh release view node-bins --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Release node-bins does not exist yet."
            exit 0
          fi

          ALL_EXIST=true
          for ARCH in $ARCHS; do
            FILE="node-v${VER}-${ARCH}.tar.gz"
            FOUND=$(gh release view node-bins --repo "$GITHUB_REPOSITORY" \
              --json assets --jq ".assets[] | select(.name == \"${FILE}\") | .name" 2>/dev/null)
            if [ -z "$FOUND" ]; then
              echo "Missing: ${FILE}"
              ALL_EXIST=false
              break
            fi
          done

          if $ALL_EXIST; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "v${VER} all binaries already present, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Need to upload missing binaries for v${VER}."
          fi

      - name: Download Node.js musl binaries
        if: steps.check.outputs.skip == 'false'
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ARCHS="${{ steps.arches.outputs.archs }}"

          echo "Downloading Node.js v${VER} musl builds..."
          for ARCH in $ARCHS; do
            FILE="node-v${VER}-${ARCH}.tar.gz"
            URL="https://unofficial-builds.nodejs.org/download/release/v${VER}/${FILE}"
            echo "  -> ${FILE}"
            curl -fsSL "$URL" -o "$FILE" || { echo "ERROR: Failed to download ${FILE}"; exit 1; }
          done

          # Verify each file is a real tarball (> 10 MB)
          for ARCH in $ARCHS; do
            FILE="node-v${VER}-${ARCH}.tar.gz"
            SIZE=$(stat -c%s "$FILE")
            if [ "$SIZE" -lt 10000000 ]; then
              echo "ERROR: ${FILE} too small (${SIZE} bytes) — likely a 404 page"
              exit 1
            fi
            echo "  OK: ${FILE} (${SIZE} bytes)"
          done

      - name: Create or update node-bins release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ARCHS="${{ steps.arches.outputs.archs }}"
          REPO="$GITHUB_REPOSITORY"

          if ! gh release view node-bins --repo "$REPO" >/dev/null 2>&1; then
            printf 'Precompiled Node.js musl static builds for OpenWrt (x86_64, aarch64, armv7l).\n\nSources: https://unofficial-builds.nodejs.org/\n\nThese binaries are used by openclaw-env to install Node.js on OpenWrt devices.\n' \
              > /tmp/node-bins-notes.md
            gh release create node-bins \
              --repo "$REPO" \
              --title "Node.js musl binaries" \
              --notes-file /tmp/node-bins-notes.md \
              --prerelease
          fi

          for ARCH in $ARCHS; do
            gh release upload node-bins "node-v${VER}-${ARCH}.tar.gz" --repo "$REPO" --clobber
            echo "Uploaded: node-v${VER}-${ARCH}.tar.gz"
          done

      - name: Cleanup old versions
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEEP="${{ github.event.inputs.keep_versions }}"
          [ -z "$KEEP" ] && KEEP=3
          REPO="$GITHUB_REPOSITORY"

          echo "Keeping last ${KEEP} Node.js versions in node-bins release..."

          # Fetch all asset IDs and names
          gh api "repos/${REPO}/releases/tags/node-bins" \
            --jq '.assets[] | "\(.id) \(.name)"' > /tmp/assets.txt

          if [ ! -s /tmp/assets.txt ]; then
            echo "No assets found, nothing to clean up."
            exit 0
          fi

          # Group assets by Node.js version (e.g. "22.16.0")
          declare -A VER_ASSETS
          while IFS=' ' read -r ID NAME; do
            # Extract version from filenames like node-v22.16.0-linux-x64-musl.tar.gz
            VER_KEY=$(echo "$NAME" | sed -E 's/node-v([0-9]+\.[0-9]+\.[0-9]+)-.*/\1/')
            VER_ASSETS["$VER_KEY"]+="$ID "
          done < /tmp/assets.txt

          # Sort versions descending and delete oldest ones beyond KEEP
          SORTED=$(printf '%s\n' "${!VER_ASSETS[@]}" | sort -t. -k1,1nr -k2,2nr -k3,3nr)
          COUNT=0
          while IFS= read -r V; do
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -gt "$KEEP" ]; then
              echo "Deleting old version: v${V}"
              for ASSET_ID in ${VER_ASSETS[$V]}; do
                gh api "repos/${REPO}/releases/assets/${ASSET_ID}" -X DELETE
                echo "  Deleted asset ${ASSET_ID}"
              done
            fi
          done <<< "$SORTED"

          echo "Cleanup done. Kept ${KEEP} latest versions."
